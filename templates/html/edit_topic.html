{{define "content"}}
<link rel="stylesheet" href="/static/css/styles_login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<form method="POST" action="/topic/edit" enctype="multipart/form-data" class="large-form">

    <h1>MODIFIER LE SUJET</h1>

    <input type="hidden" name="topic_id" value="{{.Topic.ID}}">

    <!-- Ligne Titre + Catégorie -->
    <div class="row-flex">

        <div class="input-group half">
            <i class="fa-solid fa-heading icon"></i>
            <input type="text" name="title" value="{{.Topic.Title}}" required>
        </div>

        <div class="input-group half">
            <i class="fa-solid fa-tags icon"></i>
            <select name="category" required class="selection">
                <option value="Sport" {{if eq .Topic.Category "Sport"}}selected{{end}}>Sport</option>
                <option value="Musique" {{if eq .Topic.Category "Musique"}}selected{{end}}>Musique</option>
                <option value="Automobile" {{if eq .Topic.Category "Automobile"}}selected{{end}}>Automobile</option>
                <option value="Aviation" {{if eq .Topic.Category "Aviation"}}selected{{end}}>Aviation</option>
                <option value="Science" {{if eq .Topic.Category "Science"}}selected{{end}}>Science</option>
                <option value="Informatique" {{if eq .Topic.Category "Informatique"}}selected{{end}}>Informatique</option>
                <option value="Autre" {{if eq .Topic.Category "Autre"}}selected{{end}}>Autre</option>
            </select>
        </div>

    </div>

    </div>

    <!-- Contenu -->
    <div class="input-group textarea-group">
        <textarea name="content" rows="8" required>{{.Topic.Content}}</textarea>
    </div>

    <!-- Boutons -->
    <button type="submit">Enregistrer</button>

    <a href="/topic/view?id={{.Topic.ID}}" 
       style="display:block; text-align:center; margin-top:15px; color:white; opacity:0.7; text-decoration:none;">
       Annuler
    </a>
</form>

{{end}}
