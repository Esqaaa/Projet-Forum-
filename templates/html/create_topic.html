{{define "content"}}
<link rel="stylesheet" href="/static/css/styles_login.css"> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<form method="POST" action="/topic/create" enctype="multipart/form-data" class="large-form">
    <h1>NOUVEAU SUJET</h1>

    <div class="row-flex">
        <div class="input-group half">
            <i class="fa-solid fa-heading icon"></i>
            <input type="text" name="title" placeholder="Titre du topic" required>
        </div>

        <div class="input-group half">
            <i class="fa-solid fa-tags icon"></i>
            <select name="category" required class="selection">
                <option value="" disabled selected>Choix catégorie</option>
                <option value="Sport">Sport</option>
                <option value="Musique">Musique</option>
                <option value="Automobile">Automobile</option>
                <option value="Aviation">Aviation</option>
                <option value="Science">Science</option>
                <option value="Informatique">Informatique</option>
                <option value="Autre">Autre</option>
            </select>
        </div>
    </div>

    <div class="image-section-wrapper">
        <div class="image-upload">
            <label for="image" class="upload-btn">
                <i class="fa-solid fa-image icon-upload"></i>
                <span>Ajouter une image (Optionnel)</span>
            </label>
            <input type="file" id="image" name="image" accept="image/*" style="display: none;">
        </div>

        <div id="preview-container">
            <img id="preview" src="" alt="Aperçu">
            <button type="button" id="removeImage"><i class="fa-solid fa-trash"></i></button>
        </div>
    </div>
    
    <div class="input-group textarea-group">
        <textarea name="content" placeholder="Contenu de votre message..." rows="8" ></textarea>
    </div>

    <button type="submit">Publier</button>
    <a href="/" style="display: block; text-align: center; margin-top: 15px; color: white; text-decoration: none; opacity: 0.7;">Annuler</a>
    <script src="../../static/js/script_picture.js"></script>
</form>
    
{{end}}
